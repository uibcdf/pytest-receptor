[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pytest-receptor"
version = "0.1.0"
description = "Un plugin de pytest para adaptar la salida de las pruebas a diferentes receptores (humanos, LLMs, CI)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pytest>=8.0.0",
]

[project.entry-points."pytest11"]
receptor = "pytest_receptor.plugin"

[project.optional-dependencies]
dev = [
    "ruff",
    "tiktoken",
]
